  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyCg9fxgrXlEuKW_m5MvDnG26Uf6lLdiYik",
      authDomain: "bwetv-ug.firebaseapp.com",
      projectId: "bwetv-ug",
      storageBucket: "bwetv-ug.firebasestorage.app",
      messagingSenderId: "481870926362",
      appId: "1:481870926362:web:f406a0f135449ccfaa77a3",
      measurementId: "G-SJ5YJH2G7C",
      databaseURL: "https://bwetv-ug-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.firestore();
    const rtdb = firebase.database();

    // TEMP bypass auth for testing
    auth.signInAnonymously().catch(err => console.error(err));

    // Live Chat
    document.getElementById("chatBtn").addEventListener("click", () => {
      const msg = document.getElementById("chatInput").value;
      if (msg.trim() !== "") {
        rtdb.ref("chat").push({
          text: msg,
          user: auth.currentUser ? auth.currentUser.uid : "guest",
          timestamp: Date.now()
        });
        document.getElementById("chatInput").value = "";
        alert("✅ Message sent!");
      }
    });

    rtdb.ref("chat").on("child_added", snapshot => {
      const msg = snapshot.val();
      const div = document.createElement("div");
      div.className = "p-2 border rounded bg-white";
      div.innerHTML = `<strong>${msg.user}</strong>: ${msg.text}`;
      document.getElementById("chatContainer").appendChild(div);
    });

    // Forums
    document.getElementById("postBtn").addEventListener("click", () => {
      const text = document.getElementById("postInput").value;
      if (text.trim() !== "") {
        db.collection("posts").add({
          text,
          user: auth.currentUser ? auth.currentUser.uid : "guest",
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById("postInput").value = "";
        alert("✅ Post submitted!");
      }
    });

    db.collection("posts").orderBy("timestamp", "desc").onSnapshot(snapshot => {
      const container = document.getElementById("postsContainer");
      container.innerHTML = "";
      snapshot.forEach(doc => {
        const post = doc.data();
        const div = document.createElement("div");
        div.className = "p-2 border rounded bg-white";
        div.innerHTML = `<strong>${post.user}</strong><br>${post.text}`;
        container.appendChild(div);
      });
    });

    // Support Us
    document.getElementById("donatePaypalBtn").addEventListener("click", () => {
      window.location.href = "https://www.paypal.com/donate?business=oyoovincentoyoo1725@gmail.com";
    });
    document.getElementById("donateMtnBtn").addEventListener("click", () => {
      alert("📱 To donate via MTN Mobile Money, send funds to: +256774231123");
    });

    // Newsletter
    function handleNewsletterSignup(event) {
      event.preventDefault();
      const email = event.target.querySelector('input[type="email"]').value;
      alert(`✅ Welcome! We've sent a confirmation email to ${email}`);
      event.target.reset();
    }
  </script>
</body>

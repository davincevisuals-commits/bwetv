<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BWE TV Live Chat</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
  <style>
    .mobile-menu {
      transition: all 0.3s ease;
    }
    .mobile-menu.hidden {
      max-height: 0;
      overflow: hidden;
    }
    .mobile-menu.visible {
      max-height: 300px;
    }
    .chat-container {
      display: flex;
      height: calc(100vh - 200px);
    }
    .video-section {
      flex: 2;
      min-width: 0;
    }
    .chat-section {
      flex: 1;
      min-width: 0;
      background-color: #f9fafb;
      border-left: 2px solid #e5e7eb;
      display: flex;
      flex-direction: column;
    }
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column-reverse;
    }
    .message {
      margin-bottom: 1rem;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .message.own {
      text-align: right;
    }
    .message-bubble {
      display: inline-block;
      padding: 0.75rem 1rem;
      border-radius: 1rem;
      max-width: 80%;
      word-wrap: break-word;
    }
    .message.own .message-bubble {
      background-color: #dc2626;
      color: white;
      border-radius: 1rem 0 1rem 1rem;
    }
    .message.other .message-bubble {
      background-color: #e5e7eb;
      color: #1f2937;
      border-radius: 0 1rem 1rem 1rem;
    }
    .message-timestamp {
      font-size: 0.75rem;
      color: #9ca3af;
      margin-top: 0.25rem;
    }
    .message-author {
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .input-area {
      padding: 1rem;
      border-top: 2px solid #e5e7eb;
      background-color: white;
    }
    .input-form {
      display: flex;
      gap: 0.5rem;
    }
    .input-form input {
      flex: 1;
      padding: 0.5rem;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      focus: outline-none;
    }
    .input-form input:focus {
      outline: none;
      border-color: #dc2626;
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
    }
    .input-form button {
      padding: 0.5rem 1rem;
      background-color: #dc2626;
      color: white;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 600;
      transition: background-color 0.3s;
    }
    .input-form button:hover {
      background-color: #b91c1c;
    }
    .online-count {
      background-color: #10b981;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 1rem;
      font-size: 0.875rem;
      font-weight: 600;
      display: inline-block;
      margin-bottom: 1rem;
    }
    .system-message {
      background-color: #fef3c7;
      color: #92400e;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      text-align: center;
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }
    .moderator-badge {
      background-color: #7c3aed;
      color: white;
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      font-size: 0.75rem;
      margin-left: 0.5rem;
      font-weight: 600;
    }
    .username-display {
      font-weight: 600;
      color: #1f2937;
    }
    @media (max-width: 768px) {
      .chat-container {
        flex-direction: column;
        height: auto;
      }
      .video-section {
        flex: none;
        margin-bottom: 1rem;
      }
      .chat-section {
        height: 500px;
        border-left: none;
        border-top: 2px solid #e5e7eb;
      }
    }
  </style>
</head>
<body class="bg-white text-black">

  <!-- Header -->
  <header class="bg-yellow-900 text-white sticky top-0 z-50 shadow-lg">
    <div class="flex justify-between items-center p-4">
      <div class="text-2xl font-bold">BWE <span class="bg-red-600 px-2">TV</span></div>
      
      <!-- Desktop Navigation -->
      <nav class="hidden md:flex space-x-6">
        <a href="index.html" class="hover:text-yellow-200 transition">Home</a>
        <a href="schedule.html" class="hover:text-yellow-200 transition">Programs</a>
        <a href="shows.html" class="hover:text-yellow-200 transition">Shows</a>
        <a href="community.html" class="hover:text-yellow-200 transition">Community</a>
        <a href="live-chat.html" class="text-yellow-200 font-bold transition">Live Chat</a>
      </nav>
      
      <!-- Mobile Menu Toggle Button -->
      <button id="mobileMenuBtn" class="md:hidden text-2xl hover:bg-yellow-800 p-2 rounded transition">☰</button>
    </div>

    <!-- Mobile Navigation Menu -->
    <nav id="mobileMenu" class="mobile-menu hidden bg-yellow-800 md:hidden">
      <div class="flex flex-col p-4 space-y-3">
        <a href="index.html" class="hover:text-yellow-200 transition">Home</a>
        <a href="schedule.html" class="hover:text-yellow-200 transition">Programs</a>
        <a href="shows.html" class="hover:text-yellow-200 transition">Shows</a>
        <a href="community.html" class="hover:text-yellow-200 transition">Community</a>
        <a href="live-chat.html" class="text-yellow-200 font-bold transition">Live Chat</a>
      </div>
    </nav>
  </header>

  <!-- Main Chat Container -->
  <div class="chat-container">
    <!-- Video Section -->
    <div class="video-section p-4 bg-black">
      <h1 class="text-white text-2xl font-bold mb-4">📺 Live Stream</h1>
      <video id="livePlayer" class="video-js vjs-default-skin w-full h-auto" controls autoplay preload="auto" data-setup='{"fluid": true, "aspectRatio": "16:9"}'>
        <source src="http://yourserverip:8080/live/streamkey.m3u8" type="application/x-mpegURL">
        <source src="video.mp4" type="video/mp4">
      </video>
      <div class="mt-4 text-white">
        <div class="flex items-center gap-2 mb-2">
          <span class="inline-block w-3 h-3 bg-red-500 rounded-full animate-pulse"></span>
          <span id="currentShowName" class="font-bold">Loading...</span>
        </div>
        <p id="currentShowHost" class="text-sm text-gray-300"></p>
      </div>
    </div>

    <!-- Chat Section -->
    <div class="chat-section">
      <!-- Chat Header -->
      <div class="bg-white border-b p-4">
        <div class="flex items-center justify-between">
          <div>
            <h2 class="text-lg font-bold text-gray-800">Live Chat</h2>
            <p class="text-sm text-gray-600">Interact with viewers</p>
          </div>
          <div class="online-count">
            <span id="onlineCount">0</span> online
          </div>
        </div>
      </div>

      <!-- Messages Area -->
      <div id="messagesArea" class="messages-area">
        <div class="system-message">
          💬 Welcome to BWE TV Live Chat! Be respectful and follow community guidelines.
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <form id="chatForm" class="input-form">
          <input 
            type="text" 
            id="messageInput" 
            placeholder="Type a message..." 
            maxlength="200"
            autocomplete="off"
            class="rounded"
          >
          <button type="submit" class="rounded">Send</button>
        </form>
        <div class="text-xs text-gray-500 mt-2">
          Logged in as: <span id="usernameDisplay" class="font-bold text-gray-700">Guest</span>
          <button type="button" onclick="changeUsername()" class="ml-2 text-blue-600 hover:underline">Change</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="content.js"></script>

  <script>
    // Mobile Menu Toggle
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const mobileMenu = document.getElementById('mobileMenu');

    mobileMenuBtn.addEventListener('click', function() {
      mobileMenu.classList.toggle('hidden');
      mobileMenu.classList.toggle('visible');
    });

    document.querySelectorAll('#mobileMenu a').forEach(link => {
      link.addEventListener('click', function() {
        mobileMenu.classList.add('hidden');
        mobileMenu.classList.remove('visible');
      });
    });

    // Chat System
    class LiveChat {
      constructor() {
        this.username = this.getUsername();
        this.userId = this.generateUserId();
        this.socket = null;
        this.messages = [];
        this.onlineCount = 0;
        this.isModerator = false;
        
        this.initChat();
        this.setupEventListeners();
        this.displayCurrentShow();
      }

      getUsername() {
        let username = localStorage.getItem('bwetv_username');
        if (!username) {
          username = 'Guest_' + Math.floor(Math.random() * 10000);
          localStorage.setItem('bwetv_username', username);
        }
        return username;
      }

      generateUserId() {
        return 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
      }

      initChat() {
        // For local development without server, we'll simulate messages
        this.initLocalChat();
        this.updateUsernameDisplay();
      }

      initLocalChat() {
        // Simulate online count
        this.onlineCount = Math.floor(Math.random() * 500) + 50;
        this.updateOnlineCount();

        // Add some initial messages
        this.addSystemMessage('🎉 Stream started - Welcome to BWE TV Live Chat!');
        
        // Simulate incoming messages
        setTimeout(() => {
          this.simulateMessage('John_23', 'Great show today! 🔥', false);
        }, 2000);

        setTimeout(() => {
          this.simulateMessage('Sarah_K', 'Love the content!', false);
        }, 4000);

        setTimeout(() => {
          this.simulateMessage('Moderator_Bot', 'Thanks for watching! Please follow community guidelines.', true);
        }, 6000);
      }

      setupEventListeners() {
        const form = document.getElementById('chatForm');
        const input = document.getElementById('messageInput');

        form.addEventListener('submit', (e) => {
          e.preventDefault();
          const message = input.value.trim();
          if (message) {
            this.sendMessage(message);
            input.value = '';
            input.focus();
          }
        });
      }

      sendMessage(text) {
        const messageObj = {
          id: this.generateMessageId(),
          author: this.username,
          userId: this.userId,
          text: this.filterMessage(text),
          timestamp: new Date(),
          own: true,
          isModerator: this.isModerator
        };

        this.messages.push(messageObj);
        this.displayMessage(messageObj);

        // Simulate response after delay
        if (Math.random() > 0.7) {
          setTimeout(() => {
            this.simulateMessage('Sarah_K', 'Nice message! 👍', false);
          }, 1000 + Math.random() * 2000);
        }
      }

      simulateMessage(author, text, isModerator = false) {
        const messageObj = {
          id: this.generateMessageId(),
          author: author,
          userId: 'user_' + Math.random().toString(36).substr(2, 9),
          text: text,
          timestamp: new Date(),
          own: false,
          isModerator: isModerator
        };

        this.messages.push(messageObj);
        this.displayMessage(messageObj);
        
        // Update online count occasionally
        if (Math.random() > 0.8) {
          this.onlineCount += Math.floor(Math.random() * 10) - 5;
          if (this.onlineCount < 10) this.onlineCount = 10;
          this.updateOnlineCount();
        }
      }

      displayMessage(messageObj) {
        const messagesArea = document.getElementById('messagesArea');
        const messageEl = document.createElement('div');
        messageEl.className = `message ${messageObj.own ? 'own' : 'other'}`;

        const timestamp = messageObj.timestamp.toLocaleTimeString('en-US', {
          hour: '2-digit',
          minute: '2-digit',
          hour12: true
        });

        let moderatorBadge = '';
        if (messageObj.isModerator) {
          moderatorBadge = '<span class="moderator-badge">MOD</span>';
        }

        const authorHtml = `<div class="message-author"><span class="username-display">${this.escapeHtml(messageObj.author)}</span>${moderatorBadge}</div>`;

        messageEl.innerHTML = `
          ${!messageObj.own ? authorHtml : ''}
          <div class="message-bubble">${this.escapeHtml(messageObj.text)}</div>
          <div class="message-timestamp">${timestamp}</div>
        `;

        messagesArea.insertBefore(messageEl, messagesArea.firstChild);

        // Keep only last 100 messages in DOM
        const allMessages = messagesArea.querySelectorAll('.message');
        if (allMessages.length > 100) {
          allMessages[allMessages.length - 1].remove();
        }
      }

      addSystemMessage(text) {
        const messagesArea = document.getElementById('messagesArea');
        const messageEl = document.createElement('div');
        messageEl.className = 'system-message';
        messageEl.textContent = text;
        messagesArea.insertBefore(messageEl, messagesArea.firstChild);
      }

      filterMessage(text) {
        // Basic profanity filter - add more words as needed
        const bannedWords = ['badword1', 'badword2'];
        let filtered = text;
        
        bannedWords.forEach(word => {
          const regex = new RegExp(word, 'gi');
          filtered = filtered.replace(regex, '*'.repeat(word.length));
        });

        return filtered;
      }

      escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      generateMessageId() {
        return 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
      }

      updateOnlineCount() {
        document.getElementById('onlineCount').textContent = this.onlineCount;
      }

      updateUsernameDisplay() {
        document.getElementById('usernameDisplay').textContent = this.username;
      }

      displayCurrentShow() {
        const currentShow = getCurrentShow();
        if (currentShow) {
          document.getElementById('currentShowName').textContent = `Live: ${currentShow.show}`;
          document.getElementById('currentShowHost').textContent = `Hosted by ${currentShow.host}`;
        }
      }
    }

    // Initialize chat when page loads
    let chat;
    document.addEventListener('DOMContentLoaded', function() {
      chat = new LiveChat();
    });

    // Change username function
    function changeUsername() {
      const newUsername = prompt('Enter your new username (2-20 characters):', chat.username);
      if (newUsername && newUsername.length >= 2 && newUsername.length <= 20) {
        const oldUsername = chat.username;
        chat.username = newUsername.replace(/[^a-zA-Z0-9_-]/g, '');
        localStorage.setItem('bwetv_username', chat.username);
        chat.updateUsernameDisplay();
        chat.addSystemMessage(`👤 ${oldUsername} changed name to ${chat.username}`);
      } else if (newUsername) {
        alert('Username must be 2-20 characters and contain only letters, numbers, hyphens, and underscores.');
      }
    }
  </script>
</body>
</html>

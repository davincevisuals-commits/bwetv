<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BWE TV Live</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
</head>
<body class="bg-white text-black">

  <!-- Header -->
  <header class="bg-yellow-900 text-white flex justify-between items-center p-4">
    <div class="text-2xl font-bold">BWE <span class="bg-red-600 px-2">TV</span></div>
    <nav class="hidden md:flex space-x-6">
      <a href="index.html">Home</a>
      <a href="schedule.html">Programs</a>
      <a href="shows.html">Shows</a>
      <a href="community.html">Community</a>
    </nav>
    <button class="md:hidden text-2xl">☰</button>
  </header>

  <!-- Hero Section -->
  <section class="text-center bg-black text-white p-6">
    <h1 class="text-3xl font-bold mb-4">WATCH BWE TV LIVE NOW</h1>
    <video id="livePlayer" class="video-js vjs-default-skin w-full h-auto" controls autoplay preload="auto" data-setup='{}'>
      <source src="http://yourserverip:8080/live/streamkey.m3u8" type="application/x-mpegURL">
    </video>
    <div class="mt-4">
      <button class="bg-red-600 text-white px-4 py-2 rounded">LIVE</button>
      <button class="bg-white text-black px-4 py-2 rounded ml-2">Join the Community</button>
    </div>
  </section>

  <!-- Programs -->
  <section class="p-6">
    <h2 class="text-2xl text-red-600 mb-4">Today's Programs</h2>
    <div class="grid md:grid-cols-2 gap-4">
      <div class="border p-4">Local News</div>
      <div class="border p-4">Culture Show</div>
      <div class="border p-4">Health Talk</div>
      <div class="border p-4">Youth Forum</div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-yellow-900 text-white text-center p-4">
    <p>© 2026 BWE TV | About | Privacy | Contact</p>
    <div class="flex justify-center space-x-4 mt-2">
      <a href="#">Facebook</a>
      <a href="#">Twitter</a>
      <a href="#">YouTube</a>
      <a href="#">Instagram</a>
    </div>
  </footer>

  <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
</body>
</html>
